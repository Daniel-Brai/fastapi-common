<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }}</title>
        <link rel="icon" href="{{ favicon_url }}" type="image/x-icon" />
        <style>
            :root {
                --color-bg: #1a0505;
                --color-surface: #240a0a;
                --color-surface2: #331414;
                --color-text: #ffffff;
                --color-text-muted: #ff9999;
                --color-border: #4d1f1f;
                --color-accent: #ff4d4d;
                --color-accent-text: #330000;
            }
            body {
                background-color: var(--color-bg);
                color: var(--color-text);
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                font-size: 13px;
                line-height: 1.6;
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
                text-align: center;
            }
            .container {
                max-width: 500px;
                padding: 20px;
            }
            h1 {
                font-size: 24px;
                font-weight: 200;
                font-style: italic;
                letter-spacing: -0.03em;
                margin-bottom: 16px;
            }
            p {
                font-size: 13px;
                color: var(--color-text-muted);
                margin-bottom: 32px;
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
                    "Liberation Mono", "Courier New", monospace;
            }
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 8px 14px;
                font-size: 11px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                background-color: var(--color-accent);
                color: var(--color-accent-text);
                border: 1px solid var(--color-accent);
                text-decoration: none;
                font-weight: 500;
                border-radius: 2px;
                transition: opacity 0.15s;
            }
            .btn:hover {
                opacity: 0.8;
            }
            .header-line {
                width: 100%;
                height: 1px;
                background-color: var(--color-surface2);
                margin: 2rem 0;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>{{ status_code }}</h1>
            <p>{{ error_message }}</p>
            <div class="header-line"></div>
            {{ action_button }}
        </div>
    </body>
</html>
